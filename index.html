<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liquid Glass Pixar Avatar</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --glass-bg: rgba(255, 255, 255, 0.15); --glass-blur: 16px; --glass-border: rgba(255, 255, 255, 0.4); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        body { display: flex; height: 100vh; background: #0f172a; color: #fff; overflow: hidden; }
        .preview-container { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; background: linear-gradient(135deg, #cee8ff 0%, #f6d1fb 50%, #d4bafc 100%); overflow: hidden; }
        .shape { position: absolute; filter: blur(60px); border-radius: 50%; }
        .shape-1 { width: 400px; height: 400px; background: #4facfe; top: -100px; left: -100px; }
        .shape-2 { width: 500px; height: 500px; background: #fa709a; bottom: -150px; right: -50px; }
        .shape-3 { width: 300px; height: 300px; background: #43e97b; bottom: 50px; left: 20%; }
        .glass-card { position: relative; width: 340px; padding: 40px 30px; border-radius: 24px; display: flex; flex-direction: column; align-items: center; text-align: center; z-index: 10; background: var(--glass-bg); backdrop-filter: blur(var(--glass-blur)) saturate(120%); -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(120%); border: 1px solid rgba(255, 255, 255, 0.2); border-top: 1px solid var(--glass-border); border-left: 1px solid var(--glass-border); box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1), inset 0 0 20px rgba(255, 255, 255, 0.2); transition: all 0.3s ease; }
        .avatar-container { width: 120px; height: 120px; border-radius: 50%; margin-bottom: 20px; padding: 4px; background: linear-gradient(135deg, rgba(255,255,255,0.8), rgba(255,255,255,0.1)); box-shadow: 0 8px 16px rgba(0,0,0,0.1); position: relative; }
        .avatar { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; background-color: rgba(255, 255, 255, 0.2); }
        .name { font-size: 24px; font-weight: 600; color: #1e293b; margin-bottom: 5px; text-shadow: 0 1px 2px rgba(255,255,255,0.5); }
        .title { font-size: 14px; color: #475569; font-weight: 500; letter-spacing: 0.5px; text-transform: uppercase; }
        .controls { width: 380px; background: #1e293b; padding: 30px; display: flex; flex-direction: column; gap: 20px; overflow-y: auto; box-shadow: -5px 0 15px rgba(0,0,0,0.3); z-index: 20; }
        h2 { font-size: 18px; margin-bottom: 5px; border-bottom: 1px solid #334155; padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center;}
        .badge { background: #8b5cf6; font-size: 10px; padding: 2px 6px; border-radius: 12px; font-weight: bold; }
        .control-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 13px; color: #94a3b8; font-weight: 500; }
        input[type="text"], input[type="file"], select { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: #fff; outline: none; }
        button { padding: 14px; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; transition: background 0.2s; margin-top: 10px; }
        .btn-primary { background: #3b82f6; color: #fff; }
        .btn-primary:hover { background: #2563eb; }
        .btn-ai { background: linear-gradient(135deg, #8b5cf6, #ec4899); color: white; margin-top: 5px; }
        .btn-ai:hover { opacity: 0.9; }
        .btn-ai:disabled { opacity: 0.5; cursor: not-allowed; }
        .hint { font-size: 12px; color: #64748b; text-align: center; margin-top: 5px; }
        .loading-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); border-radius: 50%; display: none; align-items: center; justify-content: center; }
        .spinner { width: 24px; height: 24px; border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: #fff; animation: spin 1s ease-in-out infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="preview-container" id="capture-area">
        <div class="shape shape-1"></div><div class="shape shape-2"></div><div class="shape shape-3"></div>
        <div class="glass-card" id="card">
            <div class="avatar-container">
                <img src="https://ui-avatars.com/api/?name=JD&background=random&size=200" alt="Profile" class="avatar" id="avatar-preview">
                <div class="loading-overlay" id="loading-spinner"><div class="spinner"></div></div>
            </div>
            <div class="name" id="name-preview">Jane Doe</div>
            <div class="title" id="title-preview">Product Designer</div>
        </div>
    </div>

    <div class="controls">
        <h2>Pixar Portrait Generator <span class="badge">VISION AI</span></h2>
        
        <div class="control-group">
            <label>Upload Your Face Photo</label>
            <input type="file" id="image-upload" accept="image/*">
        </div>

        <div class="control-group">
            <label>Pastel Background Gradient</label>
            <select id="background-select">
                <option value="soft pink and blue gradient">Soft Pink & Blue Cloud</option>
                <option value="lavender and mint green gradient">Lavender & Mint Green</option>
                <option value="apricot and pale yellow gradient">Apricot & Pale Yellow</option>
                <option value="sky blue and peach gradient">Sky Blue & Peach</option>
            </select>
            <button class="btn-ai" id="generate-ai-btn" disabled>⚡ Create Pixar Avatar</button>
            <div class="hint">Upload a photo first to enable AI styling.</div>
        </div>

        <h2 style="margin-top: 10px;">Manual Settings</h2>

        <div class="control-group">
            <label>Full Name</label>
            <input type="text" id="name-input" value="Jane Doe">
        </div>
        <div class="control-group">
            <label>Job Title</label>
            <input type="text" id="title-input" value="Product Designer">
        </div>

        <button class="btn-primary" id="download-btn">Download Card as Image</button>
    </div>

    <script>
        const imageUpload = document.getElementById('image-upload');
        const avatarPreview = document.getElementById('avatar-preview');
        const nameInput = document.getElementById('name-input');
        const namePreview = document.getElementById('name-preview');
        const titleInput = document.getElementById('title-input');
        const titlePreview = document.getElementById('title-preview');
        const downloadBtn = document.getElementById('download-btn');
        const captureArea = document.getElementById('capture-area');
        const generateAiBtn = document.getElementById('generate-ai-btn');
        const backgroundSelect = document.getElementById('background-select');
        const loadingSpinner = document.getElementById('loading-spinner');

        let userBase64Image = null;

        imageUpload.addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    avatarPreview.src = e.target.result;
                    userBase64Image = e.target.result;
                    generateAiBtn.disabled = false;
                    generateAiBtn.textContent = "⚡ Create Pixar Avatar";
                }
                reader.readAsDataURL(file);
            }
        });

        nameInput.addEventListener('input', (e) => namePreview.textContent = e.target.value);
        titleInput.addEventListener('input', (e) => titlePreview.textContent = e.target.value);

        generateAiBtn.addEventListener('click', async () => {
            if (!userBase64Image) return;

            generateAiBtn.disabled = true;
            generateAiBtn.textContent = "Processing (approx. 25s)...";
            loadingSpinner.style.display = "flex";

            try {
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        image: userBase64Image,
                        backgroundStyle: backgroundSelect.value 
                    })
                });

                if (!response.ok) {
                    throw new Error(`Server Error: ${response.statusText}`);
                }

                const data = await response.json();
                
                if (data.error) {
                     throw new Error(data.error);
                }

                avatarPreview.src = data.imageUrl;

            } catch (error) {
                console.error("AI Generation Error:", error);
                alert("Generation failed. Check the Vercel logs for details.");
            } finally {
                generateAiBtn.disabled = false;
                generateAiBtn.textContent = "⚡ Create Pixar Avatar";
                loadingSpinner.style.display = "none";
            }
        });

        downloadBtn.addEventListener('click', () => {
            downloadBtn.textContent = "Generating high-res image...";
            downloadBtn.disabled = true;

            html2canvas(captureArea, { scale: 2, useCORS: true, backgroundColor: null }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'liquid-glass-pixar-profile.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
                downloadBtn.textContent = "Download Card as Image";
                downloadBtn.disabled = false;
            });
        });
    </script>
</body>
</html>
